<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
}

body{
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;
}

canvas{
  position:absolute;
  inset:0;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#audioPrompt .box{
  border:2px solid #000;
  padding:28px;
  background:#fff;
  text-align:center;
}

#audioPrompt button{
  margin:8px;
  padding:8px 18px;
  cursor:pointer;
  border:2px solid #000;
  background:#fff;
  font-weight:600;
}

#soundToggle{
  position:absolute;
  top:18px;
  right:18px;
  z-index:30;
  font-size:24px;
  cursor:pointer;
  color:#fff;
}

#progressWrap{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.2);
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#fff;
}

#hint{
  position:absolute;
  bottom:24px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:18px;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  z-index:50;
}

#endCanvas{
  position:absolute;
  inset:0;
}

#endContent{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

#endContent h1{
  font-size:clamp(44px,7vw,82px);
  margin:0;
}

#endContent p{
  opacity:.85;
  margin-top:10px;
}

.buttons{
  margin-top:26px;
  display:flex;
  gap:14px;
}

.buttons button{
  padding:12px 24px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound for a better experience?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<div id="soundToggle">🔇</div>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Clean the fog slowly
</div>

<canvas id="canvas"></canvas>

<div id="endScreen">

  <canvas id="endCanvas"></canvas>

  <div id="endContent">

    <h1>☀ CLEAR</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const endCanvas=document.getElementById('endCanvas');
const endCtx=endCanvas.getContext('2d');

const progress=document.getElementById('progress');

let W,H;

function resize(){
  W=canvas.width=endCanvas.width=innerWidth;
  H=canvas.height=endCanvas.height=innerHeight;
  drawFog();
}
resize();
addEventListener('resize',resize);

let mouse={x:0,y:0};

canvas.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
  clearFog(mouse.x,mouse.y);
});

canvas.addEventListener('touchmove',e=>{
  mouse.x=e.touches[0].clientX;
  mouse.y=e.touches[0].clientY;
  clearFog(mouse.x,mouse.y);
},{passive:true});

function drawFog(){
  ctx.fillStyle='rgba(220,230,235,.96)';
  ctx.fillRect(0,0,W,H);
}

let cleanedMap=new Set();
let finished=false;

function clearFog(x,y){

  if(finished) return;

  ctx.save();

  ctx.globalCompositeOperation='destination-out';

  const g=ctx.createRadialGradient(x,y,0,x,y,90);

  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.arc(x,y,90,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  const gx=Math.floor(x/40);
  const gy=Math.floor(y/40);

  const key=`${gx}-${gy}`;

  if(!cleanedMap.has(key)){

    cleanedMap.add(key);

    const percent=(cleanedMap.size/220)*100;

    progress.style.width=
    Math.min(percent,100)+'%';

    if(percent>=100){

      finished=true;

      finalScreen();
    }
  }
}

/* AUDIO checking*/

let audioCtx,soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||webkitAudioContext)();
  }
}

document.getElementById('audioYes').onclick=()=>{
  initAudio();
  audioCtx.resume();
  soundOn=true;
  document.getElementById('soundToggle').textContent='🔊';
  document.getElementById('audioPrompt').style.display='none';
};

document.getElementById('audioNo').onclick=()=>{
  document.getElementById('audioPrompt').style.display='none';
};

document.getElementById('soundToggle').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('soundToggle').textContent=
  soundOn?'🔊':'🔇';

  if(soundOn){
    initAudio();
    audioCtx.resume();
  }
};

/* END SCREEN */

let confetti=[];

function spawnConfetti(){

  confetti=[];

  const colors=[
    '#ffffff',
    '#dff6ff',
    '#caf0f8'
  ];

  for(let i=0;i<120;i++){

    confetti.push({
      x:Math.random()*W,
      y:-20,
      vy:2+Math.random()*3,
      c:colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

function finalScreen(){

  spawnConfetti();

  document.getElementById('endScreen')
  .style.display='block';

  function loop(){

    endCtx.clearRect(0,0,W,H);

    confetti.forEach(c=>{

      endCtx.fillStyle=c.c;

      endCtx.fillRect(c.x,c.y,6,12);

      c.y+=c.vy;
    });

    requestAnimationFrame(loop);
  }

  loop();
}

function restartGame(){

  finished=false;

  cleanedMap.clear();

  progress.style.width='0%';

  document.getElementById('endScreen')
  .style.display='none';

  drawFog();
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
