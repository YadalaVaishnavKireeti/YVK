<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
}

body{
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;
}

canvas{
  position:absolute;
  inset:0;
}

#progressWrap{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.25);
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#fff;
}

#hint{
  position:absolute;
  bottom:24px;
  width:100%;
  text-align:center;
  color:#fff;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(6px);
}

.endCard{
  text-align:center;
  color:#fff;
}

.endCard h1{
  font-size:clamp(42px,8vw,82px);
}

.buttons{
  margin-top:24px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.buttons button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Clear every bit of fog
</div>

<canvas id="canvas"></canvas>

<div id="endScreen">

  <div class="endCard">

    <h1>☀ CLEAR</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

const progress=document.getElementById('progress');

let W,H;

function resize(){

  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;

  drawFog();
}
resize();

addEventListener('resize',resize);

function drawFog(){

  ctx.fillStyle='rgba(220,230,235,.97)';
  ctx.fillRect(0,0,W,H);
}

let finished=false;

function clearFog(x,y){

  if(finished) return;

  ctx.save();

  ctx.globalCompositeOperation='destination-out';

  const g=ctx.createRadialGradient(x,y,0,x,y,80);

  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.arc(x,y,80,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  checkProgress();
}

canvas.addEventListener('mousemove',e=>{
  clearFog(e.clientX,e.clientY);
});

canvas.addEventListener('touchmove',e=>{
  clearFog(
    e.touches[0].clientX,
    e.touches[0].clientY
  );
},{passive:true});

function checkProgress(){

  const imageData=
  ctx.getImageData(0,0,W,H).data;

  let transparent=0;

  for(let i=3;i<imageData.length;i+=80){

    if(imageData[i]<40){
      transparent++;
    }
  }

  const total=imageData.length/80;

  const percent=(transparent/total)*100;

  progress.style.width=
  percent+'%';

  if(percent>97){

    finished=true;

    document.getElementById('endScreen')
    .style.display='flex';
  }
}

function restartGame(){

  finished=false;

  progress.style.width='0%';

  drawFog();

  document.getElementById('endScreen')
  .style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
