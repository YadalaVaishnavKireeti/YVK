<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
}

body{
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;
  background-size:cover;
  background-position:center;
}

canvas{
  position:absolute;
  inset:0;
}

#progressWrap{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.25);
  border-radius:999px;
  overflow:hidden;
  z-index:5;
}

#progress{
  width:0%;
  height:100%;
  background:#fff;
  transition:.15s linear;
}

#hint{
  position:absolute;
  bottom:24px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:15px;
  z-index:5;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(6px);
  z-index:20;
}

.endCard{
  text-align:center;
  color:#fff;
}

.endCard h1{
  font-size:clamp(46px,8vw,82px);
  margin:0;
}

.endCard p{
  margin-top:12px;
  opacity:.9;
}

.buttons{
  margin-top:28px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.buttons button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

#confettiCanvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Clear every bit of fog
</div>

<canvas id="canvas"></canvas>

<div id="endScreen">

  <canvas id="confettiCanvas"></canvas>

  <div class="endCard">

    <h1>☀ CLEAR</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});

const confettiCanvas=document.getElementById('confettiCanvas');
const confettiCtx=confettiCanvas.getContext('2d');

const progress=document.getElementById('progress');

let W,H;

function resize(){

  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;

  confettiCanvas.width=W;
  confettiCanvas.height=H;

  drawFog();
}

resize();

addEventListener('resize',resize);

/* =========================
   FOG
========================= */

function drawFog(){

  ctx.clearRect(0,0,W,H);

  ctx.fillStyle='rgba(220,230,235,.97)';
  ctx.fillRect(0,0,W,H);
}

let finished=false;

/* =========================
   ERASE
========================= */

function clearFog(x,y){

  if(finished) return;

  ctx.save();

  ctx.globalCompositeOperation='destination-out';

  const g=ctx.createRadialGradient(
    x,y,0,
    x,y,80
  );

  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  ctx.fillStyle=g;

  ctx.beginPath();
  ctx.arc(x,y,80,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  checkProgress();
}

canvas.addEventListener('mousemove',e=>{
  clearFog(e.clientX,e.clientY);
});

canvas.addEventListener('touchmove',e=>{
  clearFog(
    e.touches[0].clientX,
    e.touches[0].clientY
  );
},{passive:true});

/* =========================
   REAL PROGRESS CHECK
========================= */

function checkProgress(){

  const imageData=
  ctx.getImageData(0,0,W,H).data;

  let transparent=0;

  for(let i=3;i<imageData.length;i+=80){

    if(imageData[i] < 20){
      transparent++;
    }
  }

  const total=imageData.length/80;

  const percent=(transparent/total)*100;

  progress.style.width=
  Math.min(percent,100)+'%';

  if(percent > 99.4){

    finished=true;

    finalScreen();
  }
}

/* =========================
   CONFETTI
========================= */

let confetti=[];

function spawnConfetti(){

  confetti=[];

  const colors=[
    '#ffffff',
    '#dff6ff',
    '#caf0f8'
  ];

  for(let i=0;i<120;i++){

    confetti.push({

      x:Math.random()*W,
      y:-20,

      vy:2+Math.random()*3,

      size:4+Math.random()*6,

      c:colors[
        Math.floor(
          Math.random()*colors.length
        )
      ]
    });
  }
}

function drawConfetti(){

  confettiCtx.clearRect(0,0,W,H);

  confetti.forEach(c=>{

    confettiCtx.fillStyle=c.c;

    confettiCtx.fillRect(
      c.x,
      c.y,
      c.size,
      c.size*1.8
    );

    c.y+=c.vy;

    if(c.y>H+20){
      c.y=-20;
    }
  });

  requestAnimationFrame(drawConfetti);
}

/* =========================
   FINAL
========================= */

function finalScreen(){

  document.getElementById('endScreen')
  .style.display='flex';

  spawnConfetti();

  drawConfetti();
}

/* =========================
   RESTART
========================= */

function restartGame(){

  finished=false;

  progress.style.width='0%';

  document.getElementById('endScreen')
  .style.display='none';

  drawFog();
}

/* =========================
   HOME
========================= */

function goHome(){

  window.location.href='../index.html';
}
</script>

</body>
</html>
