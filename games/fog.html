<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
}

body{
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;
}

canvas{
  position:absolute;
  inset:0;
}

#progressWrap{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.25);
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:white;
}

#hint{
  position:absolute;
  bottom:24px;
  width:100%;
  text-align:center;
  color:white;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.2);
  color:white;
  backdrop-filter:blur(4px);
}

.buttons{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.buttons button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Clear every part of the fog
</div>

<canvas id="canvas"></canvas>

<div id="endScreen">

  <h1>☀ CLEAR</h1>

  <p style="margin-top:10px;">
    Getting DIGITAL Soon!
  </p>

  <div class="buttons">
    <button onclick="restartGame()">Play Again</button>
    <button onclick="goHome()">Homepage</button>
  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const progress=document.getElementById('progress');

let W,H;

function resize(){

  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;

  drawFog();
}
resize();

addEventListener('resize',resize);

function drawFog(){

  ctx.fillStyle='rgba(220,230,235,.96)';
  ctx.fillRect(0,0,W,H);
}

let finished=false;

function clearFog(x,y){

  if(finished) return;

  ctx.save();

  ctx.globalCompositeOperation=
    'destination-out';

  const g=
    ctx.createRadialGradient(
      x,y,10,
      x,y,110
    );

  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(.7,'rgba(0,0,0,.7)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  ctx.fillStyle=g;

  ctx.beginPath();

  ctx.arc(
    x,
    y,
    110,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();

  checkFogCompletion();
}

function checkFogCompletion(){

  const sample=
    ctx.getImageData(
      0,
      0,
      W,
      H
    ).data;

  let fogPixels=0;

  for(let i=3;i<sample.length;i+=32){

    if(sample[i]>20){
      fogPixels++;
    }
  }

  const total=
    sample.length/32;

  const cleared=
    ((total-fogPixels)/total)*100;

  progress.style.width=
    Math.min(cleared,100)+'%';

  if(cleared>=99.2 && !finished){

    finished=true;

    document.getElementById('endScreen')
    .style.display='flex';
  }
}

canvas.addEventListener('mousemove',e=>{
  clearFog(e.clientX,e.clientY);
});

canvas.addEventListener('touchmove',e=>{
  clearFog(
    e.touches[0].clientX,
    e.touches[0].clientY
  );
},{passive:true});

function restartGame(){

  finished=false;

  drawFog();

  progress.style.width='0%';

  document.getElementById('endScreen')
  .style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
