<!-- games/fog.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clean The Fog</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
}

body{
  position:fixed;
  inset:0;

  background:
  url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1400&auto=format&fit=crop')
  center center / cover no-repeat;
}

canvas{
  position:fixed;
  inset:0;
}

#title{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:clamp(24px,4vw,42px);
  font-weight:600;
  letter-spacing:2px;
  text-shadow:0 4px 20px rgba(0,0,0,.5);
}

#hint{
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
  color:white;
  opacity:.85;
  font-size:clamp(14px,2vw,20px);
}

#progressWrap{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.2);
}

#progress{
  width:0%;
  height:100%;
  border-radius:999px;

  background:linear-gradient(
    90deg,
    #80ffdb,
    #64dfdf,
    #56cfe1
  );
}

#endScreen{
  position:fixed;
  inset:0;

  display:none;

  align-items:center;
  justify-content:center;

  background:rgba(0,0,0,.3);

  backdrop-filter:blur(10px);

  z-index:20;
}

.endCard{
  background:rgba(255,255,255,.12);

  padding:42px;

  border-radius:28px;

  text-align:center;

  width:min(90%,520px);

  color:white;
}

.endCard h1{
  font-size:clamp(38px,6vw,70px);
  margin-bottom:12px;
}

.endCard p{
  opacity:.8;
  line-height:1.8;
  margin-bottom:26px;
}

.buttons{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

.buttons button{
  padding:12px 22px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  font-weight:600;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="title">
  CLEAN THE FOG
</div>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Wipe away the fog to reveal peace
</div>

<div id="endScreen">

  <div class="endCard">

    <h1>☀ Peace Revealed</h1>

    <p>
      The fog has disappeared.<br>
      Your mind feels lighter now.
    </p>

    <div class="buttons">

      <button onclick="restartGame()">
        Play Again
      </button>

      <button onclick="goHome()">
        Homepage
      </button>

    </div>

  </div>

</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const progress=document.getElementById("progress");

let W,H;

function resize(){

  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;

  drawFog();
}

resize();

addEventListener("resize",resize);

function drawFog(){

  ctx.fillStyle='rgba(220,230,235,.96)';
  ctx.fillRect(0,0,W,H);
}

drawFog();

let revealedArea=0;
let finished=false;

function clearFog(x,y){

  if(finished) return;

  revealedArea += 0.35;

  const percent=Math.min(
    100,
    revealedArea
  );

  progress.style.width=percent+'%';

  if(percent>=100 && !finished){

    finished=true;

    setTimeout(()=>{
      showEnding();
    },1000);
  }

  ctx.save();

  ctx.globalCompositeOperation='destination-out';

  const g=ctx.createRadialGradient(
    x,y,0,
    x,y,90
  );

  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  ctx.fillStyle=g;

  ctx.beginPath();

  ctx.arc(
    x,
    y,
    90,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();
}

addEventListener("mousemove",e=>{
  clearFog(
    e.clientX,
    e.clientY
  );
});

addEventListener("touchmove",e=>{

  clearFog(
    e.touches[0].clientX,
    e.touches[0].clientY
  );

},{passive:true});

function showEnding(){

  document.getElementById("endScreen")
  .style.display='flex';
}

function restartGame(){

  revealedArea=0;
  finished=false;

  progress.style.width='0%';

  drawFog();

  document.getElementById("endScreen")
  .style.display='none';
}

function goHome(){

  window.location.href='../index.html';
}
</script>

</body>
</html>
