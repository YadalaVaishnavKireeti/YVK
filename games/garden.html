<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restore Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
  background:#f7f7f5;
}

canvas{
  position:fixed;
  inset:0;
}

/* AUDIO */
#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.94);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#audioPrompt .box{
  background:#fff;
  border:1px solid #ddd;
  padding:28px;
  border-radius:18px;
  text-align:center;
  width:min(90%,340px);
}

#audioPrompt p{margin-bottom:18px;color:#333;}

#audioPrompt button{
  padding:10px 18px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
  margin:0 6px;
}

/* UI */
#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#title{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  font-size:clamp(24px,4vw,40px);
  font-weight:600;
  color:#1d1d1d;
}

#message{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  color:#444;
}

/* END SCREEN (collect.html style) */
#endScreen{
  position:fixed;
  inset:0;
  display:none;
  z-index:50;
  background:rgba(255,255,255,.92);
}

#endCanvas{
  position:absolute;
  inset:0;
}

#endContent{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#endContent h1{
  font-size:clamp(44px,6vw,72px);
  margin-bottom:10px;
}

#endContent p{
  color:#444;
  margin-bottom:20px;
}

.endBtns{
  display:flex;
  gap:14px;
}

.endBtns button{
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound for a better experience?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="title">RESTORE GARDEN</div>
  <div id="message">Touch every sleeping seed to awaken the garden</div>
</div>

<!-- END SCREEN -->
<div id="endScreen">
  <canvas id="endCanvas"></canvas>
  <div id="endContent">
    <h1>🌿 Garden Restored</h1>
    <p>Getting DIGITAL Soon!</p>
    <div class="endBtns">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const endCanvas=document.getElementById("endCanvas");
const endCtx=endCanvas.getContext("2d");

let W,H;
function resize(){
  W=canvas.width=endCanvas.width=innerWidth;
  H=canvas.height=endCanvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* AUDIO (UNCHANGED) */
let audioCtx;
let soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||webkitAudioContext)();
  }
}

function beep(freq=700,dur=0.08,vol=0.04){
  if(!soundOn) return;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=freq;

  gain.gain.value=vol;

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime+dur
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+dur);
}

/* AUDIO UI */
document.getElementById("audioYes").onclick=()=>{
  initAudio();
  audioCtx.resume();
  soundOn=true;
  document.getElementById("audioPrompt").style.display="none";
};

document.getElementById("audioNo").onclick=()=>{
  soundOn=false;
  document.getElementById("audioPrompt").style.display="none";
};

/* POINTER */
const mouse={x:W/2,y:H/2,tx:W/2,ty:H/2};

addEventListener("mousemove",e=>{
  mouse.tx=e.clientX;
  mouse.ty=e.clientY;
});

/* GARDEN STATE (UNCHANGED CORE LOGIC) */
const TOTAL=20;
let awakened=0;
let gameFinished=false;
let endTriggered=false;

const seeds=[];

function createSeeds(){
  seeds.length=0;
  for(let i=0;i<TOTAL;i++){
    seeds.push({
      x:80+Math.random()*(W-160),
      y:120+Math.random()*(H-240),
      r:8,
      pulse:Math.random()*10,
      active:true,
      color:['#7abf8a','#9ad4a5','#f6d365','#d4a373'][Math.floor(Math.random()*4)]
    });
  }
}
createSeeds();

/* FLOWERS */
const flowers=[];
function spawnFlower(x,y,color){
  flowers.push({x,y,r:0,max:20+Math.random()*10,petals:6,color});
}
function drawFlowers(){
  flowers.forEach(f=>{
    if(f.r<f.max) f.r+=0.25;
    for(let i=0;i<f.petals;i++){
      const a=(Math.PI*2/f.petals)*i;
      ctx.beginPath();
      ctx.ellipse(
        f.x+Math.cos(a)*f.r,
        f.y+Math.sin(a)*f.r,
        f.r*.42,
        f.r*.22,
        a,0,Math.PI*2
      );
      ctx.fillStyle=f.color;
      ctx.fill();
    }
  });
}

/* PARTICLES */
const particles=[];
function spawnParticles(x,y){
  for(let i=0;i<10;i++){
    particles.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:1});
  }
}
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=0.025;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.life})`;
    ctx.fill();
    if(p.life<=0) particles.splice(i,1);
  }
}

/* CONFETTI + LEAF */
const confetti=[];
function spawnConfetti(){
  for(let i=0;i<100;i++){
    confetti.push({
      x:Math.random()*W,
      y:-20,
      vy:2+Math.random()*2,
      size:5+Math.random()*5,
      c:['#7abf8a','#9ad4a5','#c8e6c9','#f6d365'][Math.floor(Math.random()*4)]
    });
  }
}

let leafA=0;
function drawLeaf(){
  leafA+=0.02;
  const x=W/2+Math.sin(leafA)*80;
  const y=H/2-60+Math.cos(leafA*1.4)*20;

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(Math.sin(leafA)*0.4);
  ctx.beginPath();
  ctx.moveTo(0,-18);
  ctx.quadraticCurveTo(18,0,0,18);
  ctx.quadraticCurveTo(-18,0,0,-18);
  ctx.fillStyle="#7abf8a";
  ctx.fill();
  ctx.restore();
}

/* SEED LOGIC */
function updateSeeds(){
  seeds.forEach(seed=>{
    if(!seed.active) return;

    const d=Math.hypot(mouse.x-seed.x,mouse.y-seed.y);
    ctx.beginPath();
    ctx.arc(seed.x,seed.y,seed.r+Math.sin(seed.pulse)*1.5,0,Math.PI*2);
    ctx.fillStyle=seed.color;
    ctx.fill();

    if(d<22){
      beep();
      seed.active=false;
      awakened++;
      spawnFlower(seed.x,seed.y,seed.color);
      spawnParticles(seed.x,seed.y);

      if(awakened===TOTAL && !endTriggered){
        endTriggered=true;

        setTimeout(()=>{
          gameFinished=true;
          spawnConfetti();
          document.getElementById("endScreen").style.display="flex";
        },5000); // 5 sec delay
      }
    }
  });
}

/* HOME + RESTART */
function goHome(){
  window.location.href="../index.html";
}

function restartGame(){
  awakened=0;
  flowers.length=0;
  particles.length=0;
  confetti.length=0;
  gameFinished=false;
  endTriggered=false;
  createSeeds();
  document.getElementById("endScreen").style.display="none";
}

/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  mouse.x+=(mouse.tx-mouse.x)*0.08;
  mouse.y+=(mouse.ty-mouse.y)*0.08;

  ctx.clearRect(0,0,W,H);

  drawFlowers();
  updateSeeds();
  drawParticles();

  confetti.forEach(c=>{
    ctx.fillStyle=c.c;
    ctx.fillRect(c.x,c.y,6,12);
    c.y+=c.vy;
  });

  if(gameFinished) drawLeaf();

  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,7,0,Math.PI*2);
  ctx.fillStyle="#222";
  ctx.fill();
}

animate();
</script>

</body>
</html>
