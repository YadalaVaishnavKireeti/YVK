<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Restore Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
  background:#f7f7f4;
}

canvas{
  position:fixed;
  inset:0;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.94);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
}

.box{
  background:white;
  border:1px solid #ddd;
  padding:28px;
  border-radius:18px;
  text-align:center;
}

.box button{
  margin:10px;
  padding:10px 18px;
  border:none;
  background:#222;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#title{
  position:absolute;
  top:22px;
  width:100%;
  text-align:center;
  font-size:clamp(20px,4vw,34px);
  color:#2d4739;
  font-weight:600;
}

#message{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  color:#555;
}

#progressWrap{
  position:absolute;
  top:76px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:#dfe8df;
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#79b791;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(6px);
}

.buttons{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.buttons button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="ui">

  <div id="title">
    Restore Garden
  </div>

  <div id="progressWrap">
    <div id="progress"></div>
  </div>

  <div id="message">
    Wake every sleeping seed
  </div>

</div>

<div id="endScreen">

  <h1>🌱 Garden Restored</h1>

  <p style="margin-top:10px;color:#555;">
    Getting DIGITAL Soon!
  </p>

  <div class="buttons">
    <button onclick="restartGame()">Play Again</button>
    <button onclick="goHome()">Homepage</button>
  </div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let W,H;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const progressBar=document.getElementById("progress");
const message=document.getElementById("message");

/* ================= AUDIO ================= */

let audioCtx;
let soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||webkitAudioContext)();
  }
}

function playBeep(freq=620,duration=0.08){

  if(!soundOn || !audioCtx) return;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type='sine';
  osc.frequency.value=freq;

  gain.gain.value=0.06;

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + duration
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

/* ================= AUDIO PROMPT ================= */

document.getElementById("audioYes").onclick=async()=>{

  initAudio();

  await audioCtx.resume();

  soundOn=true;

  document.getElementById("soundToggle").textContent='🔊';

  document.getElementById("audioPrompt").style.display='none';
};

document.getElementById("audioNo").onclick=()=>{

  soundOn=false;

  document.getElementById("soundToggle").textContent='🔇';

  document.getElementById("audioPrompt").style.display='none';
};

document.getElementById("soundToggle").onclick=async()=>{

  soundOn=!soundOn;

  document.getElementById("soundToggle").textContent=
  soundOn ? '🔊' : '🔇';

  if(soundOn){

    initAudio();

    await audioCtx.resume();
  }
};

/* ================= POINTER ================= */

const mouse={
  x:W/2,
  y:H/2,
  tx:W/2,
  ty:H/2
};

addEventListener("mousemove",e=>{
  mouse.tx=e.clientX;
  mouse.ty=e.clientY;
});

addEventListener("touchmove",e=>{
  mouse.tx=e.touches[0].clientX;
  mouse.ty=e.touches[0].clientY;
},{passive:true});

/* ================= COLORS ================= */

const COLORS=[
  '#8ecae6',
  '#90be6d',
  '#f9c74f',
  '#f9844a',
  '#b8e0d2'
];

/* ================= FLOWERS ================= */

const flowers=[];

function spawnFlower(x,y,color){

  flowers.push({
    x,
    y,
    r:0,
    max:16+Math.random()*12,
    petals:6,
    color
  });
}

function drawFlowers(){

  flowers.forEach(f=>{

    if(f.r<f.max){
      f.r+=0.25;
    }

    for(let i=0;i<f.petals;i++){

      const angle=(Math.PI*2/f.petals)*i;

      const px=f.x+Math.cos(angle)*f.r;
      const py=f.y+Math.sin(angle)*f.r;

      ctx.beginPath();

      ctx.arc(
        px,
        py,
        f.r*0.38,
        0,
        Math.PI*2
      );

      ctx.fillStyle=f.color;
      ctx.fill();
    }

    ctx.beginPath();

    ctx.arc(
      f.x,
      f.y,
      f.r*0.22,
      0,
      Math.PI*2
    );

    ctx.fillStyle='#fff';
    ctx.fill();
  });
}

/* ================= SEEDS ================= */

const TOTAL=20;

let awakened=0;

const seeds=[];

function createSeeds(){

  seeds.length=0;

  for(let i=0;i<TOTAL;i++){

    seeds.push({

      x:80+Math.random()*(W-160),

      y:120+Math.random()*(H-220),

      r:8,

      pulse:Math.random()*10,

      active:true,

      color:COLORS[
        Math.floor(
          Math.random()*COLORS.length
        )
      ]
    });
  }
}

createSeeds();

/* ================= CONFETTI ================= */

let confetti=[];

function spawnConfetti(){

  confetti=[];

  for(let i=0;i<100;i++){

    confetti.push({

      x:Math.random()*W,

      y:-20,

      vy:2+Math.random()*3,

      size:4+Math.random()*8,

      color:COLORS[
        Math.floor(
          Math.random()*COLORS.length
        )
      ]
    });
  }
}

function drawConfetti(){

  confetti.forEach(c=>{

    ctx.fillStyle=c.color;

    ctx.fillRect(
      c.x,
      c.y,
      c.size,
      c.size*1.8
    );

    c.y+=c.vy;
  });
}

/* ================= END SCREEN ================= */

let finished=false;

function finalScreen(){

  spawnConfetti();

  document.getElementById(
    'endScreen'
  ).style.display='flex';
}

function restartGame(){

  awakened=0;

  finished=false;

  flowers.length=0;

  confetti=[];

  progressBar.style.width='0%';

  message.textContent=
  'Touch every sleeping seed to awaken the garden';

  createSeeds();

  document.getElementById(
    'endScreen'
  ).style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}

/* ================= LOOP ================= */

function animate(){

  requestAnimationFrame(animate);

  mouse.x += (mouse.tx-mouse.x)*0.1;
  mouse.y += (mouse.ty-mouse.y)*0.1;

  ctx.fillStyle='#f7f7f2';
  ctx.fillRect(0,0,W,H);

  drawFlowers();

  seeds.forEach(seed=>{

    if(!seed.active) return;

    seed.pulse+=0.05;

    ctx.beginPath();

    ctx.arc(
      seed.x,
      seed.y,
      seed.r + Math.sin(seed.pulse)*1.5,
      0,
      Math.PI*2
    );

    ctx.fillStyle=seed.color;

    ctx.fill();

    const dist=Math.hypot(
      mouse.x-seed.x,
      mouse.y-seed.y
    );

    if(dist<24){

      seed.active=false;

      awakened++;

      playBeep();

      spawnFlower(
        seed.x,
        seed.y,
        seed.color
      );

      progressBar.style.width=
      (awakened/TOTAL)*100+'%';

      if(awakened===TOTAL && !finished){

        finished=true;

        message.textContent=
        'The garden is fully alive ✨';

        setTimeout(()=>{
          finalScreen();
        },900);
      }
    }
  });

  drawConfetti();

  ctx.beginPath();

  ctx.arc(
    mouse.x,
    mouse.y,
    7,
    0,
    Math.PI*2
  );

  ctx.fillStyle='#222';
  ctx.fill();
}

animate();
</script>

</body>
</html>
