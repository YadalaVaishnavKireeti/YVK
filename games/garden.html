<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#071018;
  font-family:Poppins,sans-serif;
}

canvas{
  position:absolute;
  inset:0;
}

#title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:36px;
  font-weight:700;
  letter-spacing:2px;
}

#hint{
  position:absolute;
  bottom:24px;
  width:100%;
  text-align:center;
  color:#fff;
  opacity:.8;
}

#progressWrap{
  position:absolute;
  top:76px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.15);
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#80ffdb;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
}

#audioPrompt .box{
  background:#fff;
  padding:28px;
  text-align:center;
}

#audioPrompt button{
  margin:8px;
  padding:8px 18px;
  cursor:pointer;
}

#soundToggle{
  position:absolute;
  top:18px;
  right:18px;
  color:#fff;
  font-size:24px;
  cursor:pointer;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
}

#endCanvas{
  position:absolute;
  inset:0;
}

#endContent{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.buttons{
  margin-top:24px;
  display:flex;
  gap:14px;
}

.buttons button{
  padding:12px 24px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound for a better experience?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<div id="soundToggle">🔇</div>

<div id="title">RESTORE GARDEN</div>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="hint">
  Touch every seed
</div>

<canvas id="canvas"></canvas>

<div id="endScreen">

  <canvas id="endCanvas"></canvas>

  <div id="endContent">

    <h1>🌱 RESTORED</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const endCanvas=document.getElementById('endCanvas');
const endCtx=endCanvas.getContext('2d');

const progress=document.getElementById('progress');

let W,H;

function resize(){
  W=canvas.width=endCanvas.width=innerWidth;
  H=canvas.height=endCanvas.height=innerHeight;
}
resize();

addEventListener('resize',resize);

const mouse={x:0,y:0};

addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

const COLORS=[
'#80ffdb',
'#72efdd',
'#64dfdf',
'#56cfe1',
'#5e60ce'
];

const TOTAL=20;

let awakened=0;

const seeds=[];

function createSeeds(){

  seeds.length=0;

  for(let i=0;i<TOTAL;i++){

    seeds.push({

      x:80+Math.random()*(W-160),
      y:100+Math.random()*(H-200),

      r:8,

      active:true,

      color:
      COLORS[
        Math.floor(Math.random()*COLORS.length)
      ]
    });
  }
}

createSeeds();

let flowers=[];

function spawnFlower(x,y,color){

  flowers.push({
    x,y,
    r:0,
    color
  });
}

function animate(){

  requestAnimationFrame(animate);

  ctx.fillStyle='#071018';
  ctx.fillRect(0,0,W,H);

  flowers.forEach(f=>{

    if(f.r<20) f.r+=0.2;

    for(let i=0;i<6;i++){

      const angle=(Math.PI*2/6)*i;

      const px=f.x+Math.cos(angle)*f.r;
      const py=f.y+Math.sin(angle)*f.r;

      ctx.beginPath();

      ctx.arc(px,py,f.r*.4,0,Math.PI*2);

      ctx.fillStyle=f.color;

      ctx.fill();
    }
  });

  seeds.forEach(seed=>{

    if(!seed.active) return;

    ctx.beginPath();

    ctx.arc(seed.x,seed.y,seed.r,0,Math.PI*2);

    ctx.fillStyle=seed.color;

    ctx.fill();

    const d=Math.hypot(
      mouse.x-seed.x,
      mouse.y-seed.y
    );

    if(d<24){

      seed.active=false;

      awakened++;

      spawnFlower(
        seed.x,
        seed.y,
        seed.color
      );

      progress.style.width=
      (awakened/TOTAL)*100+'%';

      if(awakened===TOTAL){

        finalScreen();
      }
    }
  });
}

animate();

/* AUDIO */

let audioCtx,soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||webkitAudioContext)();
  }
}

document.getElementById('audioYes').onclick=()=>{
  initAudio();
  audioCtx.resume();
  soundOn=true;
  document.getElementById('soundToggle').textContent='🔊';
  document.getElementById('audioPrompt').style.display='none';
};

document.getElementById('audioNo').onclick=()=>{
  document.getElementById('audioPrompt').style.display='none';
};

document.getElementById('soundToggle').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('soundToggle').textContent=
  soundOn?'🔊':'🔇';
};

/* END */

let confetti=[];

function spawnConfetti(){

  confetti=[];

  for(let i=0;i<120;i++){

    confetti.push({
      x:Math.random()*W,
      y:-20,
      vy:2+Math.random()*3,
      c:COLORS[Math.floor(Math.random()*COLORS.length)]
    });
  }
}

function finalScreen(){

  spawnConfetti();

  document.getElementById('endScreen')
  .style.display='block';

  function loop(){

    endCtx.clearRect(0,0,W,H);

    confetti.forEach(c=>{

      endCtx.fillStyle=c.c;

      endCtx.fillRect(c.x,c.y,6,12);

      c.y+=c.vy;
    });

    requestAnimationFrame(loop);
  }

  loop();
}

function restartGame(){

  awakened=0;

  flowers=[];

  progress.style.width='0%';

  createSeeds();

  document.getElementById('endScreen')
  .style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
