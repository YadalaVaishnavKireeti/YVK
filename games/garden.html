<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restore Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
  background:#f7f7f5;
}

canvas{
  position:fixed;
  inset:0;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.94);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#audioPrompt .box{
  background:#fff;
  border:1px solid #ddd;
  padding:28px;
  border-radius:18px;
  text-align:center;
  width:min(90%,340px);
}

#audioPrompt p{
  margin-bottom:18px;
  color:#333;
}

#audioPrompt button{
  padding:10px 18px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
  margin:0 6px;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#title{
  position:absolute;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  font-size:clamp(24px,4vw,40px);
  font-weight:600;
  color:#1d1d1d;
  letter-spacing:2px;
}

#message{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  color:#444;
  font-size:clamp(14px,2vw,18px);
}

#progressWrap{
  position:absolute;
  top:78px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,72vw);
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:#dcdcdc;
}

#progress{
  width:0%;
  height:100%;
  background:#7abf8a;
  transition:.3s;
}

#buttons{
  position:absolute;
  bottom:100px;
  width:100%;
  display:none;
  justify-content:center;
  gap:14px;
  z-index:10;
}

#buttons button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  background:#1f1f1f;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound for a better experience?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="ui">

  <div id="title">RESTORE GARDEN</div>

  <div id="progressWrap">
    <div id="progress"></div>
  </div>

  <div id="message">
    Touch every sleeping seed to awaken the garden
  </div>

</div>

<div id="buttons">
  <button onclick="restartGame()">Play Again</button>
  <button onclick="goHome()">Homepage</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let W,H;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* AUDIO */

let audioCtx;
let soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||webkitAudioContext)();
  }
}

function beep(freq=700,dur=0.08,vol=0.04){
  if(!soundOn) return;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=freq;

  gain.gain.value=vol;
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime+dur
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+dur);
}

function celebrationChimes(){
  if(!soundOn) return;

  [523,659,784,1046].forEach((f,i)=>{
    setTimeout(()=>{
      beep(f,0.4,0.05);
    },i*180);
  });
}

document.getElementById("audioYes").onclick=()=>{
  initAudio();
  audioCtx.resume();
  soundOn=true;
  document.getElementById("audioPrompt").style.display="none";
};

document.getElementById("audioNo").onclick=()=>{
  soundOn=false;
  document.getElementById("audioPrompt").style.display="none";
};

/* UI */

const progress=document.getElementById("progress");
const message=document.getElementById("message");
const buttons=document.getElementById("buttons");

function goHome(){
  window.location.href='../index.html';
}

/* POINTER */

const mouse={
  x:W/2,
  y:H/2,
  tx:W/2,
  ty:H/2
};

addEventListener("mousemove",e=>{
  mouse.tx=e.clientX;
  mouse.ty=e.clientY;
});

addEventListener("touchmove",e=>{
  mouse.tx=e.touches[0].clientX;
  mouse.ty=e.touches[0].clientY;
},{passive:true});

/* BACKGROUND */

let worldLife=0;

function drawBackground(){

  const grd=ctx.createLinearGradient(0,0,0,H);

  grd.addColorStop(
    0,
    `rgb(${242-worldLife},248,242)`
  );

  grd.addColorStop(
    1,
    `rgb(${232-worldLife*.4},240,232)`
  );

  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);
}

/* FLOWERS */

const flowers=[];

function spawnFlower(x,y,color){

  flowers.push({
    x,y,
    r:0,
    max:20+Math.random()*10,
    petals:6,
    color
  });
}

function drawFlowers(){

  flowers.forEach(f=>{

    if(f.r<f.max){
      f.r+=0.25;
    }

    for(let i=0;i<f.petals;i++){

      const angle=(Math.PI*2/f.petals)*i;

      const px=f.x+Math.cos(angle)*f.r;
      const py=f.y+Math.sin(angle)*f.r;

      ctx.beginPath();

      ctx.ellipse(
        px,
        py,
        f.r*.42,
        f.r*.22,
        angle,
        0,
        Math.PI*2
      );

      ctx.fillStyle=f.color;
      ctx.fill();
    }

    ctx.beginPath();

    ctx.arc(f.x,f.y,f.r*.22,0,Math.PI*2);

    ctx.fillStyle="#fff";
    ctx.fill();
  });
}

/* PARTICLES */

const particles=[];

function spawnParticles(x,y){

  for(let i=0;i<10;i++){

    particles.push({
      x,y,
      vx:(Math.random()-.5)*3,
      vy:(Math.random()-.5)*3,
      life:1
    });
  }
}

function drawParticles(){

  for(let i=particles.length-1;i>=0;i--){

    const p=particles[i];

    p.x+=p.vx;
    p.y+=p.vy;

    p.life-=0.025;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      3*p.life,
      0,
      Math.PI*2
    );

    ctx.fillStyle=`rgba(255,255,255,${p.life})`;
    ctx.fill();

    if(p.life<=0){
      particles.splice(i,1);
    }
  }
}

/* CONFETTI */

const confetti=[];

function spawnConfetti(){

  for(let i=0;i<100;i++){

    confetti.push({
      x:Math.random()*W,
      y:-20,
      vy:2+Math.random()*2,
      size:5+Math.random()*5,
      color:[
        '#7abf8a',
        '#9ad4a5',
        '#c8e6c9',
        '#f6d365'
      ][Math.floor(Math.random()*4)]
    });
  }
}

function drawConfetti(){

  confetti.forEach(c=>{

    ctx.fillStyle=c.color;

    ctx.fillRect(
      c.x,
      c.y,
      c.size,
      c.size*1.6
    );

    c.y+=c.vy;
  });
}

/* FLOATING LEAF */

let leafX=0;
let leafY=0;
let leafAngle=0;

function drawLeaf(){

  leafAngle+=0.02;

  leafX=W/2 + Math.sin(leafAngle)*80;
  leafY=H/2 - 60 + Math.cos(leafAngle*1.4)*20;

  ctx.save();

  ctx.translate(leafX,leafY);
  ctx.rotate(Math.sin(leafAngle)*0.4);

  ctx.beginPath();

  ctx.moveTo(0,-18);
  ctx.quadraticCurveTo(18,0,0,18);
  ctx.quadraticCurveTo(-18,0,0,-18);

  ctx.fillStyle="#7abf8a";
  ctx.fill();

  ctx.strokeStyle="#5f9e6d";
  ctx.lineWidth=1.2;

  ctx.beginPath();
  ctx.moveTo(0,-16);
  ctx.lineTo(0,16);
  ctx.stroke();

  ctx.restore();
}

/* SEEDS */

const TOTAL=20;

let awakened=0;
let gameFinished=false;

const seeds=[];

function createSeeds(){

  seeds.length=0;

  for(let i=0;i<TOTAL;i++){

    seeds.push({

      x:80+Math.random()*(W-160),
      y:120+Math.random()*(H-240),

      r:8,

      pulse:Math.random()*10,

      active:true,

      color:[
        '#7abf8a',
        '#9ad4a5',
        '#f6d365',
        '#d4a373'
      ][Math.floor(Math.random()*4)]
    });
  }
}

createSeeds();

/* POINTER */

function drawPointer(){

  ctx.beginPath();

  ctx.arc(mouse.x,mouse.y,7,0,Math.PI*2);

  ctx.fillStyle="#222";
  ctx.fill();
}

/* GAME */

function updateSeeds(){

  seeds.forEach(seed=>{

    if(!seed.active) return;

    seed.pulse+=0.05;

    ctx.beginPath();

    ctx.arc(
      seed.x,
      seed.y,
      seed.r+Math.sin(seed.pulse)*1.5,
      0,
      Math.PI*2
    );

    ctx.fillStyle=seed.color;
    ctx.fill();

    const dist=Math.hypot(
      mouse.x-seed.x,
      mouse.y-seed.y
    );

    if(dist<22){

      beep();

      seed.active=false;

      awakened++;

      worldLife+=2;

      progress.style.width=
      (awakened/TOTAL)*100+'%';

      spawnFlower(
        seed.x,
        seed.y,
        seed.color
      );

      spawnParticles(
        seed.x,
        seed.y
      );

      if(awakened===10){

        message.textContent=
        'The garden is waking up';
      }

      if(awakened===TOTAL){

        celebrationChimes();

        message.textContent=
        'Getting DIGITAL Soon!';

        spawnConfetti();

        buttons.style.display='flex';

        gameFinished=true;
      }
    }
  });
}

/* RESTART */

function restartGame(){

  awakened=0;
  worldLife=0;
  gameFinished=false;

  flowers.length=0;
  particles.length=0;
  confetti.length=0;

  buttons.style.display='none';

  progress.style.width='0%';

  message.textContent=
  'Touch every sleeping seed to awaken the garden';

  createSeeds();
}

/* LOOP */

function animate(){

  requestAnimationFrame(animate);

  mouse.x+=(mouse.tx-mouse.x)*0.08;
  mouse.y+=(mouse.ty-mouse.y)*0.08;

  drawBackground();

  drawFlowers();

  updateSeeds();

  drawParticles();

  drawConfetti();

  if(gameFinished){
    drawLeaf();
  }

  drawPointer();

  ctx.textAlign='center';
  ctx.fillStyle='#222';

  if(gameFinished){

    ctx.font='600 48px Poppins';
    ctx.fillText('🍃',W/2,H/2-40);

    ctx.font='600 20px Poppins';
    ctx.fillText(
      'Getting DIGITAL Soon!',
      W/2,
      H/2+30
    );
  }
}

animate();
</script>

</body>
</html>
