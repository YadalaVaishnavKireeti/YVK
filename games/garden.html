<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Restore Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Poppins,sans-serif;
  background:#f7faf8;
}

canvas{
  position:fixed;
  inset:0;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.box{
  background:#fff;
  border:1px solid #ddd;
  padding:28px;
  border-radius:18px;
  text-align:center;
}

.box button{
  margin:8px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

#title{
  position:absolute;
  top:24px;
  width:100%;
  text-align:center;
  font-size:28px;
  font-weight:500;
  color:#111;
}

#message{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  color:#555;
}

#progressWrap{
  position:absolute;
  top:72px;
  left:50%;
  transform:translateX(-50%);
  width:min(300px,70vw);
  height:10px;
  background:#e7ece8;
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#86c5a4;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.92);
  z-index:30;
}

.endCard{
  text-align:center;
}

.endCard h1{
  font-size:clamp(42px,8vw,72px);
  font-weight:600;
  color:#111;
}

.endCard p{
  color:#666;
  margin-top:10px;
}

.buttons{
  margin-top:28px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.buttons button{
  border:none;
  background:#111;
  color:#fff;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound?</p>
    <button id="yes">Audio On</button>
    <button id="no">Audio Off</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="title">RESTORE GARDEN</div>

<div id="progressWrap">
  <div id="progress"></div>
</div>

<div id="message">
  Touch every sleeping seed
</div>

<div id="endScreen">

  <div class="endCard">

    <h1>✨ ALIVE</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

let W,H;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener('resize',resize);

const progress=document.getElementById('progress');

let audioCtx;
let soundOn=false;

function beep(){
  if(!soundOn) return;

  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();

  o.connect(g);
  g.connect(audioCtx.destination);

  o.frequency.value=520;
  g.gain.value=.05;

  o.start();

  g.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime+.15
  );

  o.stop(audioCtx.currentTime+.15);
}

document.getElementById('yes').onclick=()=>{
  audioCtx=new(window.AudioContext||webkitAudioContext)();
  soundOn=true;
  document.getElementById('audioPrompt').style.display='none';
}

document.getElementById('no').onclick=()=>{
  document.getElementById('audioPrompt').style.display='none';
}

const mouse={
  x:W/2,
  y:H/2
};

addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

addEventListener('touchmove',e=>{
  mouse.x=e.touches[0].clientX;
  mouse.y=e.touches[0].clientY;
},{passive:true});

const colors=[
  '#88c999',
  '#7db7d8',
  '#c8b6ff',
  '#f7d794'
];

const TOTAL=20;

let awakened=0;

let seeds=[];

function createSeeds(){

  seeds=[];

  for(let i=0;i<TOTAL;i++){

    seeds.push({
      x:80+Math.random()*(W-160),
      y:120+Math.random()*(H-220),
      r:8,
      active:true,
      color:colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

createSeeds();

let flowers=[];

function spawnFlower(x,y,c){

  flowers.push({
    x,y,c,size:0
  });
}

function drawFlowers(){

  flowers.forEach(f=>{

    if(f.size<20) f.size+=.2;

    for(let i=0;i<6;i++){

      const a=(Math.PI*2/6)*i;

      ctx.beginPath();

      ctx.arc(
        f.x+Math.cos(a)*f.size,
        f.y+Math.sin(a)*f.size,
        f.size*.35,
        0,
        Math.PI*2
      );

      ctx.fillStyle=f.c;
      ctx.fill();
    }
  });
}

function drawSeeds(){

  seeds.forEach(s=>{

    if(!s.active) return;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.color;
    ctx.fill();

    if(Math.hypot(mouse.x-s.x,mouse.y-s.y)<22){

      s.active=false;

      awakened++;

      beep();

      spawnFlower(s.x,s.y,s.color);

      progress.style.width=
      (awakened/TOTAL)*100+'%';

      if(awakened===TOTAL){

        setTimeout(()=>{
          document.getElementById('endScreen')
          .style.display='flex';
        },1000);
      }
    }
  });
}

function drawBackground(){

  ctx.fillStyle='#f7faf8';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(120,180,150,.08)';

  for(let i=0;i<8;i++){

    ctx.beginPath();

    ctx.arc(
      (i*220)%W,
      (i*120)%H,
      120,
      0,
      Math.PI*2
    );

    ctx.fill();
  }
}

function animate(){

  requestAnimationFrame(animate);

  drawBackground();

  drawFlowers();

  drawSeeds();

  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,6,0,Math.PI*2);
  ctx.fillStyle='#111';
  ctx.fill();
}

animate();

function restartGame(){

  awakened=0;

  flowers=[];

  progress.style.width='0%';

  createSeeds();

  document.getElementById('endScreen')
  .style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
