<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Restore Garden</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f1720;
  font-family:Poppins,sans-serif;
}

canvas{
  position:fixed;
  inset:0;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
  color:white;
}

#title{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:clamp(22px,3vw,34px);
  font-weight:600;
  letter-spacing:1px;
}

#message{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-size:clamp(14px,2vw,18px);
  opacity:.85;
}

#progressWrap{
  position:absolute;
  top:76px;
  left:50%;
  transform:translateX(-50%);
  width:min(320px,70vw);
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:999px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#8be9c1,#74d3ae);
  transition:.3s;
}

#audioPrompt{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}

#audioPrompt .box{
  background:#fff;
  color:#111;
  padding:24px;
  border-radius:18px;
  text-align:center;
}

#audioPrompt button{
  margin:8px;
  padding:8px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#soundToggle{
  position:absolute;
  top:18px;
  right:18px;
  color:white;
  font-size:22px;
  cursor:pointer;
  z-index:30;
}

#endScreen{
  position:fixed;
  inset:0;
  display:none;
  z-index:50;
}

#endCanvas{
  position:absolute;
  inset:0;
}

#endContent{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

#endContent h1{
  font-size:clamp(42px,7vw,78px);
}

#endContent p{
  margin-top:10px;
  opacity:.85;
}

.buttons{
  margin-top:26px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.buttons button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<canvas id="endCanvas"></canvas>

<div id="audioPrompt">
  <div class="box">
    <p>Enable sound for a better experience?</p>
    <button id="audioYes">Yes</button>
    <button id="audioNo">No</button>
  </div>
</div>

<div id="soundToggle">🔇</div>

<div id="ui">
  <div id="title">RESTORE GARDEN</div>

  <div id="progressWrap">
    <div id="progress"></div>
  </div>

  <div id="message">
    Touch every sleeping seed to awaken the garden
  </div>
</div>

<div id="endScreen">

  <div id="endContent">

    <h1>🌱 RESTORED</h1>

    <p>Getting DIGITAL Soon!</p>

    <div class="buttons">
      <button onclick="restartGame()">Play Again</button>
      <button onclick="goHome()">Homepage</button>
    </div>

  </div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const endCanvas=document.getElementById("endCanvas");
const endCtx=endCanvas.getContext("2d");

const progressBar=document.getElementById("progress");
const message=document.getElementById("message");

let W,H;

function resize(){
  W=canvas.width=endCanvas.width=innerWidth;
  H=canvas.height=endCanvas.height=innerHeight;
}
resize();

addEventListener("resize",resize);

/* AUDIO */

let audioCtx,soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||webkitAudioContext)();
  }
}

function tone(freq,dur=0.12,vol=0.1){

  if(!soundOn) return;

  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();

  o.frequency.value=freq;

  g.gain.value=vol;

  g.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime+dur
  );

  o.connect(g).connect(audioCtx.destination);

  o.start();

  o.stop(audioCtx.currentTime+dur);
}

function seedSound(){
  tone(620,0.08,0.08);
}

document.getElementById("audioYes").onclick=()=>{

  initAudio();

  audioCtx.resume();

  soundOn=true;

  document.getElementById("soundToggle")
  .textContent='🔊';

  document.getElementById("audioPrompt")
  .style.display='none';
};

document.getElementById("audioNo").onclick=()=>{

  document.getElementById("audioPrompt")
  .style.display='none';
};

document.getElementById("soundToggle").onclick=()=>{

  soundOn=!soundOn;

  document.getElementById("soundToggle")
  .textContent=soundOn?'🔊':'🔇';

  if(soundOn){
    initAudio();
    audioCtx.resume();
  }
};

/* POINTER */

const mouse={
  x:W/2,
  y:H/2,
  tx:W/2,
  ty:W/2
};

addEventListener("mousemove",e=>{
  mouse.tx=e.clientX;
  mouse.ty=e.clientY;
});

addEventListener("touchmove",e=>{
  mouse.tx=e.touches[0].clientX;
  mouse.ty=e.touches[0].clientY;
},{passive:true});

/* BG */

function drawBackground(){

  const g=ctx.createLinearGradient(0,0,0,H);

  g.addColorStop(0,'#11202a');
  g.addColorStop(1,'#1b2f2c');

  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
}

/* SEEDS */

const COLORS=[
  '#8be9c1',
  '#74d3ae',
  '#95f9c3',
  '#9be7ff'
];

const TOTAL=20;

let awakened=0;

const seeds=[];

function createSeeds(){

  seeds.length=0;

  for(let i=0;i<TOTAL;i++){

    seeds.push({

      x:80+Math.random()*(W-160),
      y:120+Math.random()*(H-240),

      r:8,

      pulse:Math.random()*10,

      active:true,

      color:
      COLORS[
        Math.floor(
          Math.random()*COLORS.length
        )
      ]
    });
  }
}

createSeeds();

const flowers=[];

function spawnFlower(x,y,color){

  flowers.push({
    x,y,
    color,
    r:0
  });
}

function drawFlowers(){

  flowers.forEach(f=>{

    if(f.r<18){
      f.r+=0.2;
    }

    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);

    ctx.strokeStyle=f.color;
    ctx.stroke();
  });
}

let confetti=[];

function spawnConfetti(){

  confetti=[];

  for(let i=0;i<100;i++){

    confetti.push({

      x:Math.random()*W,
      y:-20,

      vy:2+Math.random()*3,

      size:4+Math.random()*6,

      color:
      COLORS[
        Math.floor(
          Math.random()*COLORS.length
        )
      ]
    });
  }
}

function drawConfetti(){

  if(
    document.getElementById('endScreen')
    .style.display!=='block'
  ) return;

  endCtx.clearRect(0,0,W,H);

  confetti.forEach(c=>{

    endCtx.fillStyle=c.color;

    endCtx.fillRect(
      c.x,
      c.y,
      c.size,
      c.size*1.8
    );

    c.y+=c.vy;

    if(c.y>H+20){
      c.y=-20;
    }
  });
}

function updateSeeds(){

  seeds.forEach(seed=>{

    if(!seed.active) return;

    seed.pulse+=0.05;

    ctx.beginPath();

    ctx.arc(
      seed.x,
      seed.y,
      seed.r,
      0,
      Math.PI*2
    );

    ctx.fillStyle=seed.color;

    ctx.shadowBlur=14;
    ctx.shadowColor=seed.color;

    ctx.fill();

    ctx.shadowBlur=0;

    const dist=Math.hypot(
      mouse.x-seed.x,
      mouse.y-seed.y
    );

    if(dist<24){

      seedSound();

      seed.active=false;

      awakened++;

      progressBar.style.width=
      (awakened/TOTAL)*100+'%';

      spawnFlower(
        seed.x,
        seed.y,
        seed.color
      );

      if(awakened===TOTAL){

        message.textContent=
        'The garden is fully alive ✨';

        spawnConfetti();

        setTimeout(()=>{

          document.getElementById(
            'endScreen'
          ).style.display='block';

        },1200);
      }
    }
  });
}

function drawPointer(){

  ctx.beginPath();

  ctx.arc(
    mouse.x,
    mouse.y,
    7,
    0,
    Math.PI*2
  );

  ctx.fillStyle='white';

  ctx.fill();
}

function animate(){

  requestAnimationFrame(animate);

  mouse.x+=(mouse.tx-mouse.x)*0.12;
  mouse.y+=(mouse.ty-mouse.y)*0.12;

  drawBackground();

  drawFlowers();

  updateSeeds();

  drawPointer();

  drawConfetti();
}

animate();

function restartGame(){

  awakened=0;

  flowers.length=0;

  progressBar.style.width='0%';

  message.textContent=
  'Touch every sleeping seed to awaken the garden';

  createSeeds();

  document.getElementById(
    'endScreen'
  ).style.display='none';
}

function goHome(){
  window.location.href='../index.html';
}
</script>

</body>
</html>
