<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>

<section class="hero">

  <h1 class="logo">DRIFT</h1>

  <p class="tagline">
    Interactive mental refresh experiences
  </p>

</section>

<section class="games">

  <div class="card" onclick="openGame('games/garden.html')">

    <div class="emoji">🌱</div>

    <h2>Restore Garden</h2>

    <p>
      Bring life back to sleeping seeds.
    </p>

  </div>

  <div class="card" onclick="openGame('games/fog.html')">

    <div class="emoji">☁</div>

    <h2>Clean The Fog</h2>

    <p>
      Reveal a peaceful hidden world.
    </p>

  </div>

 <div class="card" onclick="openGame('games/collect.html')">

  <div class="emoji">🎨</div>

  <h2>Colour Drift</h2>

  <p>
    Collect floating colours and recharge your mind.
  </p>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
