<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Energy Garden</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#050816;
  font-family:Poppins,sans-serif;
}

canvas{
  position:fixed;
  inset:0;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#title{
  position:absolute;
  top:24px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:clamp(18px,3vw,28px);
  font-weight:600;
  opacity:.85;
  letter-spacing:1px;
}

#message{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:clamp(14px,2vw,20px);
  opacity:.7;
  transition:.4s;
}

#soundBtn{
  position:absolute;
  top:20px;
  right:20px;
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  color:white;
  pointer-events:auto;
  cursor:pointer;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

#overlay .card{
  width:min(90%,400px);
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  text-align:center;
  color:white;
}

#overlay h2{
  margin-bottom:10px;
  font-size:28px;
}

#overlay p{
  opacity:.8;
  margin-bottom:24px;
  line-height:1.5;
}

#overlay button{
  padding:12px 22px;
  border:none;
  border-radius:14px;
  margin:0 8px;
  cursor:pointer;
  font-weight:600;
  background:white;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="title">ENERGY GARDEN</div>
  <div id="message">Move gently and restore the world</div>

  <div id="soundBtn">🔇</div>
</div>

<div id="overlay">
  <div class="card">
    <h2>Welcome</h2>
    <p>
      Relax your mind.<br>
      Move slowly and awaken the energy around you.
    </p>

    <button id="soundYes">Sound On</button>
    <button id="soundNo">Continue Silent</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

/* =========================
   MOUSE
========================= */

const mouse = {
  x: W/2,
  y: H/2,
  tx: W/2,
  ty: H/2
};

addEventListener("mousemove",e=>{
  mouse.tx = e.clientX;
  mouse.ty = e.clientY;
});

addEventListener("touchmove",e=>{
  mouse.tx = e.touches[0].clientX;
  mouse.ty = e.touches[0].clientY;
},{passive:true});

/* =========================
   AUDIO
========================= */

let audioCtx;
let soundOn=false;

function initAudio(){
  if(!audioCtx){
    audioCtx = new(window.AudioContext||webkitAudioContext)();
  }
}

function playTone(freq=440,dur=.2,vol=.03){
  if(!soundOn) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=freq;

  gain.gain.value=vol;
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + dur
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

/* =========================
   UI
========================= */

const overlay=document.getElementById("overlay");
const soundBtn=document.getElementById("soundBtn");
const message=document.getElementById("message");

document.getElementById("soundYes").onclick=()=>{
  soundOn=true;
  soundBtn.textContent="🔊";
  initAudio();
  audioCtx.resume();
  overlay.style.display="none";
};

document.getElementById("soundNo").onclick=()=>{
  soundOn=false;
  overlay.style.display="none";
};

soundBtn.onclick=()=>{
  soundOn=!soundOn;

  if(soundOn){
    initAudio();
    audioCtx.resume();
    soundBtn.textContent="🔊";
  }else{
    soundBtn.textContent="🔇";
  }
};

/* =========================
   BACKGROUND GLOW
========================= */

let worldEnergy=0;

function drawBackground(){

  const grd = ctx.createRadialGradient(
    W/2,H/2,
    100,
    W/2,H/2,
    W
  );

  grd.addColorStop(0,`rgba(${20+worldEnergy*0.3},${40+worldEnergy*0.5},120,.25)`);
  grd.addColorStop(1,"#050816");

  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

}

/* =========================
   STARS
========================= */

const stars = Array.from({length:120},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  r:Math.random()*2,
  a:Math.random()
}));

function drawStars(){
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
}

/* =========================
   PARTICLES
========================= */

const COLORS = [
  "#80ffdb",
  "#72efdd",
  "#64dfdf",
  "#56cfe1",
  "#5e60ce"
];

const particles=[];

for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*W,
    y:Math.random()*H,
    vx:(Math.random()-.5)*0.5,
    vy:(Math.random()-.5)*0.5,
    size:2+Math.random()*4,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    life:0
  });
}

/* =========================
   TRAILS
========================= */

const trails=[];

function addTrail(){
  trails.push({
    x:mouse.x,
    y:mouse.y,
    life:1
  });

  if(trails.length>50){
    trails.shift();
  }
}

function drawTrails(){

  for(let i=0;i<trails.length;i++){

    const t=trails[i];

    ctx.beginPath();
    ctx.arc(t.x,t.y,20*t.life,0,Math.PI*2);

    ctx.fillStyle=`rgba(120,255,220,${t.life*.08})`;
    ctx.fill();

    t.life-=0.02;
  }

  while(trails.length && trails[0].life<=0){
    trails.shift();
  }
}

/* =========================
   PARTICLE LOGIC
========================= */

function updateParticles(){

  particles.forEach(p=>{

    const dx=mouse.x-p.x;
    const dy=mouse.y-p.y;

    const dist=Math.hypot(dx,dy);

    if(dist<180){

      const force=(180-dist)/180;

      p.vx += dx/dist * force * .02;
      p.vy += dy/dist * force * .02;

      p.life += .02;

      if(Math.random()<0.02){
        playTone(300 + Math.random()*400,.15,.01);
      }

      worldEnergy+=0.02;
    }

    p.vx*=0.98;
    p.vy*=0.98;

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0) p.x=W;
    if(p.x>W) p.x=0;
    if(p.y<0) p.y=H;
    if(p.y>H) p.y=0;

    const glow=10+p.life*20;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size+glow*.05,0,Math.PI*2);

    ctx.fillStyle=p.color;
    ctx.shadowBlur=glow;
    ctx.shadowColor=p.color;
    ctx.fill();

    p.life*=0.98;
  });

  ctx.shadowBlur=0;
}

/* =========================
   BREATHING AURA
========================= */

let breath=0;

function drawAura(){

  breath+=0.02;

  const r=50 + Math.sin(breath)*8;

  const grd = ctx.createRadialGradient(
    mouse.x,
    mouse.y,
    0,
    mouse.x,
    mouse.y,
    r
  );

  grd.addColorStop(0,"rgba(255,255,255,.25)");
  grd.addColorStop(1,"rgba(255,255,255,0)");

  ctx.fillStyle=grd;

  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,r,0,Math.PI*2);
  ctx.fill();
}

/* =========================
   POINTER
========================= */

function drawPointer(){

  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,4,0,Math.PI*2);

  ctx.fillStyle="white";
  ctx.fill();
}

/* =========================
   MESSAGES
========================= */

const messages = [
  "Breathe slowly",
  "The world is waking up",
  "You are doing well",
  "Let your mind rest",
  "Energy is returning",
  "Stay in the moment"
];

setInterval(()=>{
  message.textContent =
    messages[Math.floor(Math.random()*messages.length)];
},5000);

/* =========================
   LOOP
========================= */

function animate(){

  requestAnimationFrame(animate);

  mouse.x += (mouse.tx - mouse.x)*0.08;
  mouse.y += (mouse.ty - mouse.y)*0.08;

  drawBackground();
  drawStars();

  addTrail();
  drawTrails();

  drawAura();

  updateParticles();

  drawPointer();

  worldEnergy*=0.995;
}

animate();
</script>

</body>
</html>
