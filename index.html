<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Restore The Garden</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0d1117;
  font-family:Poppins,sans-serif;
}

canvas{
  position:fixed;
  inset:0;
}

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
  color:white;
}

#title{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:clamp(20px,3vw,34px);
  font-weight:600;
  opacity:.9;
  letter-spacing:2px;
}

#message{
  position:absolute;
  bottom:34px;
  width:100%;
  text-align:center;
  font-size:clamp(14px,2vw,20px);
  opacity:.8;
}

#progressWrap{
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  width:min(300px,70vw);
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#80ffdb,#64dfdf);
  transition:.3s;
}

#soundBtn{
  position:absolute;
  top:20px;
  right:20px;
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  cursor:pointer;
  font-size:18px;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  backdrop-filter:blur(8px);
}

.card{
  width:min(90%,420px);
  padding:32px;
  border-radius:24px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  text-align:center;
  color:white;
}

.card h1{
  margin-bottom:12px;
}

.card p{
  opacity:.8;
  line-height:1.6;
  margin-bottom:24px;
}

.card button{
  border:none;
  padding:12px 22px;
  border-radius:14px;
  margin:0 6px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="title">RESTORE THE GARDEN</div>

  <div id="progressWrap">
    <div id="progress"></div>
  </div>

  <div id="message">
    Touch every sleeping seed to awaken the world
  </div>

  <div id="soundBtn">🔇</div>
</div>

<div id="overlay">
  <div class="card">
    <h1>Energy Garden</h1>

    <p>
      Move slowly.<br>
      Awaken every sleeping seed.<br>
      Bring life back to the garden.
    </p>

    <button id="soundYes">Sound On</button>
    <button id="soundNo">Continue Silent</button>
  </div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let W,H;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* =========================
   UI
========================= */

const progressBar=document.getElementById("progress");
const message=document.getElementById("message");
const overlay=document.getElementById("overlay");
const soundBtn=document.getElementById("soundBtn");

/* =========================
   AUDIO
========================= */

let soundOn=false;
let audioCtx;

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||webkitAudioContext)();
  }
}

function playTone(freq=440,dur=.2,vol=.03){

  if(!soundOn) return;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=freq;

  gain.gain.value=vol;
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime+dur
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+dur);
}

document.getElementById("soundYes").onclick=()=>{
  soundOn=true;
  soundBtn.textContent="🔊";
  initAudio();
  audioCtx.resume();
  overlay.style.display="none";
};

document.getElementById("soundNo").onclick=()=>{
  overlay.style.display="none";
};

soundBtn.onclick=()=>{

  soundOn=!soundOn;

  if(soundOn){
    initAudio();
    audioCtx.resume();
    soundBtn.textContent="🔊";
  }else{
    soundBtn.textContent="🔇";
  }
};

/* =========================
   MOUSE
========================= */

const mouse={
  x:W/2,
  y:H/2,
  tx:W/2,
  ty:H/2
};

addEventListener("mousemove",e=>{
  mouse.tx=e.clientX;
  mouse.ty=e.clientY;
});

addEventListener("touchmove",e=>{
  mouse.tx=e.touches[0].clientX;
  mouse.ty=e.touches[0].clientY;
},{passive:true});

/* =========================
   WORLD
========================= */

let worldLife=0;

/* =========================
   STARS
========================= */

const stars=Array.from({length:120},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  r:Math.random()*2,
  a:Math.random()
}));

function drawStars(){

  stars.forEach(s=>{

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

    ctx.fillStyle=`rgba(255,255,255,${s.a*.6})`;
    ctx.fill();
  });
}

/* =========================
   BACKGROUND
========================= */

function drawBackground(){

  const life=Math.min(worldLife,100);

  const grd=ctx.createLinearGradient(0,0,0,H);

  grd.addColorStop(
    0,
    `rgb(${10+life},${15+life*.8},${30+life})`
  );

  grd.addColorStop(
    1,
    `rgb(${5},${20+life*.7},${20+life*.5})`
  );

  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);
}

/* =========================
   FLOWERS
========================= */

const flowers=[];

function spawnFlower(x,y,color){

  flowers.push({
    x,y,
    r:0,
    max:15+Math.random()*20,
    color,
    petals:5+Math.floor(Math.random()*4)
  });
}

function drawFlowers(){

  flowers.forEach(f=>{

    if(f.r<f.max){
      f.r+=0.3;
    }

    for(let i=0;i<f.petals;i++){

      const angle=(Math.PI*2/f.petals)*i;

      const px=f.x+Math.cos(angle)*f.r;
      const py=f.y+Math.sin(angle)*f.r;

      ctx.beginPath();
      ctx.arc(px,py,f.r*.45,0,Math.PI*2);

      ctx.fillStyle=f.color;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r*.35,0,Math.PI*2);

    ctx.fillStyle="#fff8";
    ctx.fill();
  });
}

/* =========================
   SEEDS
========================= */

const COLORS=[
  "#80ffdb",
  "#72efdd",
  "#64dfdf",
  "#56cfe1",
  "#5e60ce"
];

const TOTAL=20;

let awakened=0;

const seeds=[];

function createSeeds(){

  seeds.length=0;

  for(let i=0;i<TOTAL;i++){

    seeds.push({
      x:80+Math.random()*(W-160),
      y:100+Math.random()*(H-200),
      r:8,
      pulse:Math.random()*10,
      active:true,
      color:COLORS[
        Math.floor(Math.random()*COLORS.length)
      ]
    });
  }
}

createSeeds();

/* =========================
   PARTICLES
========================= */

const particles=[];

function spawnParticles(x,y,color){

  for(let i=0;i<12;i++){

    particles.push({
      x,y,
      vx:(Math.random()-.5)*4,
      vy:(Math.random()-.5)*4,
      life:1,
      color
    });
  }
}

function drawParticles(){

  for(let i=particles.length-1;i>=0;i--){

    const p=particles[i];

    p.x+=p.vx;
    p.y+=p.vy;

    p.life-=0.02;

    ctx.beginPath();
    ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);

    ctx.fillStyle=`rgba(255,255,255,${p.life})`;
    ctx.fill();

    if(p.life<=0){
      particles.splice(i,1);
    }
  }
}

/* =========================
   POINTER
========================= */

function drawPointer(){

  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,8,0,Math.PI*2);

  ctx.fillStyle="white";
  ctx.shadowBlur=20;
  ctx.shadowColor="#ffffff";

  ctx.fill();

  ctx.shadowBlur=0;
}

/* =========================
   GAME
========================= */

function updateSeeds(){

  seeds.forEach(seed=>{

    if(!seed.active) return;

    seed.pulse+=0.05;

    const glow=8+Math.sin(seed.pulse)*4;

    ctx.beginPath();
    ctx.arc(seed.x,seed.y,seed.r,0,Math.PI*2);

    ctx.fillStyle=seed.color;

    ctx.shadowBlur=glow;
    ctx.shadowColor=seed.color;

    ctx.fill();

    ctx.shadowBlur=0;

    const dist=Math.hypot(
      mouse.x-seed.x,
      mouse.y-seed.y
    );

    if(dist<22){

      seed.active=false;

      awakened++;

      worldLife+=5;

      progressBar.style.width=
        (awakened/TOTAL)*100 + "%";

      spawnFlower(seed.x,seed.y,seed.color);

      spawnParticles(seed.x,seed.y,seed.color);

      playTone(
        300 + awakened*20,
        .25,
        .03
      );

      if(awakened===Math.floor(TOTAL/2)){
        message.textContent=
          "The garden is breathing again";
      }

      if(awakened===TOTAL){

        message.textContent=
          "The garden is fully alive ✨";

        celebration();
      }
    }
  });
}

/* =========================
   CELEBRATION
========================= */

function celebration(){

  for(let i=0;i<50;i++){

    spawnParticles(
      Math.random()*W,
      Math.random()*H,
      COLORS[Math.floor(Math.random()*COLORS.length)]
    );
  }

  if(soundOn){

    [440,520,660,880].forEach((f,i)=>{
      setTimeout(()=>{
        playTone(f,.4,.04);
      },i*140);
    });
  }
}

/* =========================
   LOOP
========================= */

function animate(){

  requestAnimationFrame(animate);

  mouse.x += (mouse.tx-mouse.x)*0.1;
  mouse.y += (mouse.ty-mouse.y)*0.1;

  drawBackground();

  drawStars();

  drawFlowers();

  updateSeeds();

  drawParticles();

  drawPointer();
}

animate();
</script>

</body>
</html>
