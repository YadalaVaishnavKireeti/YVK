<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRIFT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Poppins,sans-serif;
  background:#ffffff;
  color:#111;
  min-height:100vh;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.18;
}

.blob:nth-child(1){
  width:300px;
  height:300px;
  background:#dff6f0;
  top:-80px;
  left:-80px;
}

.blob:nth-child(2){
  width:260px;
  height:260px;
  background:#e8efff;
  bottom:-80px;
  right:-80px;
}

.hero{
  padding:90px 20px 40px;
  text-align:center;
}

.logo{
  font-size:clamp(42px,8vw,84px);
  font-weight:600;
  letter-spacing:8px;
}

.tagline{
  margin-top:16px;
  color:#666;
  font-size:clamp(15px,2vw,18px);
}

.games{
  width:min(1100px,92%);
  margin:20px auto 80px;

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

.card{
  background:#fff;
  border:1px solid #eee;
  border-radius:24px;
  padding:34px 28px;
  cursor:pointer;
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-4px);
  border-color:#ddd;
}

.emoji{
  font-size:42px;
  margin-bottom:18px;
}

.card h2{
  font-size:24px;
  margin-bottom:10px;
  font-weight:500;
}

.card p{
  color:#666;
  line-height:1.7;
  font-size:15px;
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<section class="hero">
  <h1 class="logo">DRIFT</h1>

  <p class="tagline">
    Small calming experiences for tired minds.
  </p>
</section>

<section class="games">

  <div class="card" onclick="openGame('games/garden.html')">
    <div class="emoji">🌱</div>
    <h2>Restore Garden</h2>
    <p>Wake every sleeping seed and slowly bring life back.</p>
  </div>

  <div class="card" onclick="openGame('games/fog.html')">
    <div class="emoji">☁️</div>
    <h2>Clean The Fog</h2>
    <p>Clear away the mist and reveal a peaceful landscape.</p>
  </div>

  <div class="card" onclick="openGame('games/collect.html')">
    <div class="emoji">🎨</div>
    <h2>Colour Drift</h2>
    <p>Collect floating colours and recharge your focus.</p>
  </div>

</section>

<script>
function openGame(path){
  window.location.href=path;
}
</script>

</body>
</html>
